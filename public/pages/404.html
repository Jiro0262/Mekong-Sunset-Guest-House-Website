<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — Lotus House</title>
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <style>
    body {
      display: grid; place-items: center; min-height: 100vh;
      background: var(--color-cream); font-family: var(--font-ui, 'Jost', sans-serif);
      text-align: center; padding: 2rem;
    }
    .code {
      font-family: var(--font-display, 'Cinzel', serif);
      font-size: 6rem; line-height: 1;
      color: var(--color-gold, #C9A84C);
    }
    p { margin: 1rem 0 2.5rem; color: #3A2E1A; font-size: 1.1rem; }
    a {
      display: inline-block; padding: .75rem 2rem;
      background: var(--color-rust, #8B3A2A); color: #fff;
      text-decoration: none; border-radius: 4px; font-size: .85rem;
      letter-spacing: .1em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div>
    <p class="code">404</p>
    <p>Cette page n'existe pas ou a été déplacée.</p>
    <a href="/">← Retour à l'accueil</a>
  </div>
</body>
</html>
